<nav class="navbar" [class.colapsado]="!expandido">
    <!-- Encabezado del sidebar con logo y botón toggle -->
    <div class="navbar-header">
        <div class="navbar-logo" *ngIf="expandido">
            <img src="https://appsurgicorperu.com/NewAPI/static/avatars/LogoSurgiC_SinFondo.png" alt="SurgiCorp" />
        </div>
        <button class="btn-toggle" (click)="alternar()" title="Alternar menú">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>
    </div>

    <!-- Etiqueta del menú -->
    <div class="navbar-section-label" *ngIf="expandido">Menú de Opciones</div>

    <!-- Elementos del menú -->
    <ul class="navbar-menu">
        <li *ngFor="let item of elementosMenu">
            <a *ngIf="debeVerse(item)" [routerLink]="item.ruta" class="menu-item" [class.activo]="estaActivo(item.ruta)"
                [title]="!expandido ? item.etiqueta : ''">

                <!-- Icono del elemento (SVG personalizados estilo PowerApps/Lucide) -->
                <span class="menu-icono">
                    <!-- Home (Panel de Control) -->
                    <svg *ngIf="item.icono === 'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    <!-- Airplane (Mis Solicitudes) -->
                    <svg *ngIf="item.icono === 'airplane'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path
                            d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3.5s-2.5 0-4 1.5L13.5 8.5l-8.2-1.8c-.9-.2-1.8.1-2.4.8l-1.1 1.1c-.4.4-.4 1.1 0 1.5L9 14l-4.5 4.5L2.8 17.5c-.4-.4-1.1-.4-1.5 0l-.6.6c-.4.4-.4 1.1 0 1.5l2.1 2.1c.4.4 1.1.4 1.5 0l.6-.6c.4-.4.4-1.1 0-1.5L3.5 18 8 13.5l3.9 7.1c.4.4 1.1.4 1.5 0l1.1-1.1c.7-.6 1-1.5.8-2.3z" />
                    </svg>
                    <!-- Calendar (Calendario) -->
                    <svg *ngIf="item.icono === 'calendar'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <!-- Check (Aprobaciones) -->
                    <svg *ngIf="item.icono === 'check'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <!-- Person (Admin Usuarios) -->
                    <svg *ngIf="item.icono === 'person'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <!-- Plus (Añadir Usuario) -->
                    <svg *ngIf="item.icono === 'plus'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <!-- Message (Reportes) -->
                    <svg *ngIf="item.icono === 'message'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </span>

                <!-- Etiqueta del elemento (solo cuando está expandido) -->
                <span class="menu-etiqueta" *ngIf="expandido">{{ item.etiqueta }}</span>

                <!-- Indicador activo -->
                <span class="indicador-activo" *ngIf="estaActivo(item.ruta) && expandido"></span>
            </a>
        </li>
    </ul>
</nav>
