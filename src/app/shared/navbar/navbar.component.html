<nav class="navbar" [class.colapsado]="!expandido">
    <!-- Encabezado del sidebar con logo y botón toggle -->
    <div class="navbar-header">
        <div class="navbar-logo" *ngIf="expandido">
            <img src="https://appsurgicorperu.com/NewAPI/static/avatars/LogoSurgiC_SinFondo.png" alt="SurgiCorp" />
        </div>
        <button class="btn-toggle" (click)="alternar()" title="Alternar menú">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>
    </div>

    <!-- Etiqueta del menú -->
    <div class="navbar-section-label" *ngIf="expandido">Menú de Opciones</div>

    <!-- Elementos del menú -->
    <ul class="navbar-menu">
        <li *ngFor="let item of elementosMenu">
            <a *ngIf="debeVerse(item)" [routerLink]="item.ruta" class="menu-item" [class.activo]="estaActivo(item.ruta)"
                [title]="!expandido ? item.etiqueta : ''">

                <!-- Icono del elemento -->
                <span class="menu-icono">
                    <!-- Dashboard -->
                    <svg *ngIf="item.icono === 'dashboard'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    <!-- Solicitudes -->
                    <svg *ngIf="item.icono === 'solicitudes'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <!-- Calendario -->
                    <svg *ngIf="item.icono === 'calendario'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <!-- Admin -->
                    <svg *ngIf="item.icono === 'admin'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                </span>

                <!-- Etiqueta del elemento (solo cuando está expandido) -->
                <span class="menu-etiqueta" *ngIf="expandido">{{ item.etiqueta }}</span>

                <!-- Indicador activo -->
                <span class="indicador-activo" *ngIf="estaActivo(item.ruta) && expandido"></span>
            </a>
        </li>
    </ul>
</nav>
